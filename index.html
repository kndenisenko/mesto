<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Проект "место"</title>
</head>
<body class="body">
<header class="header">
  <img class="header__logo" src="./images/logo.png" alt="Логотип проекта Mesto">
</header>
<main class="page">
  <section class="profile">
    <img class="profile__avatar" src="./images/avatar.jpg" alt="Аватар пользователя">
    <div class="pofile__info">
      <h1 class="pofile__info-name">Жак-Ив Кусто</h1>
      <button class="profile__button-edit" type="button"></button>
      <p class="pofile__info-occupation">Исследователь океана</p>
    </div>
    <button class="profile__button-add" type="button"></button>
  </section>
  <section class="elements">
  </section>
</main>
<footer class="footer">
  <p class="footer__copyright">&copy; 2020. Mesto Russia</p>
</footer>

<template id="card">
  <div class="element">
    <div class="element__thrashcan"></div>
    <img class="element__image" src="" alt="">
    <div class="element__section">
      <h2 class="element__paragraph"></h2>
      <button class="element__button-like" type="button"></button>
    </div>
  </div>
</template>

<form class="popup popup_changeUser">
  <div class="popup__container">
    <button class="popup__close-button" type="reset"></button>
    <h2 class="popup__paragraph">Редактировать профиль</h2>
    <div class="popup__forms">
      <input class="popup__input popup__input_name" type="text" value="" id="username">
      <input class="popup__input popup__input_occupation" type="text" value="" id="occupation">
    </div>
    <button class="popup__button-save" type="submit">Сохранить</button>
  </div>
</form>

<form class="popup popup_addCard">
  <div class="popup__container">
    <button class="popup__close-button popup__close-button_addCard" type="reset"></button>
    <h2 class="popup__paragraph">Новое место</h2>
    <div class="popup__forms">
      <input class="popup__input popup__input_addCard" type="text" value="" placeholder="Название" id="firstInput">
      <input class="popup__input popup__input_addCard" type="text" value="" placeholder="Ссылка на картинку" id="secondInput">
    </div>
    <button class="popup__button-save" type="submit">Сохранить</button>
  </div>
</form>

<div class="popup popup_photobox">
  <div class="popup__photobox-container" style="position: fixed">
    <button class="popup__photobox-close" type="button"></button>
    <figure class="popup__image-container">
      <img class="popup__photobox-image" src="" alt="">
      <figcaption class="popup__photobox-caption"></figcaption>
    </figure>
  </div>
</div>

<script src="./scripts/script.js"></script>
</body>
</html>
